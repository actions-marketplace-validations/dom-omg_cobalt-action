name: 'COBALT Security Scanner'
description: 'Z3-verified integer overflow detection for C/C++. Every finding formally proven by Z3 SMT — zero false positives.'
author: 'Dominik Blain — QreativeLab'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Directory to scan (default: repo root)'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report: CRITICAL, HIGH, MEDIUM, LOW'
    required: false
    default: 'HIGH'
  sarif-file:
    description: 'Path to write SARIF output file'
    required: false
    default: 'cobalt-results.sarif'
  fail-on-findings:
    description: 'Exit with code 1 if confirmed findings are found'
    required: false
    default: 'false'

outputs:
  sarif-file:
    description: 'Path to the generated SARIF file'
  finding-count:
    description: 'Number of Z3-confirmed findings'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/dom-omg/cobalt:v1'
  args:
    - ${{ inputs.path }}
    - ${{ inputs.severity }}
    - ${{ inputs.sarif-file }}
    - ${{ inputs.fail-on-findings }}
