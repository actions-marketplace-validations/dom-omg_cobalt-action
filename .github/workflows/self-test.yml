name: Self-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  security-events: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run COBALT on test fixtures
        uses: ./
        with:
          path: test/fixtures
          severity: LOW
          sarif-file: cobalt-results.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: cobalt-results.sarif
          category: cobalt-self-test
